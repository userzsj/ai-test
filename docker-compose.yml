version: '3.8'

services:
  # MySQL 数据库 
  db:
    image: mysql:8.0
    container_name: ai-test-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root123456}
      MYSQL_DATABASE: ${DB_NAME:-fastapi_db}
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 5

  # FastAPI 后端
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: ai-test-backend
    restart: always
    environment:
      ENVIRONMENT: production
      DATABASE_URL: mysql+pymysql://root:${DB_ROOT_PASSWORD:-root123456}@db:3306/${DB_NAME:-fastapi_db}?charset=utf8mb4
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_FROM: ${MAIL_FROM}
      MAIL_PORT: 587
      MAIL_SERVER: smtp.qq.com
      REDIS_URL: redis://redis:6379/0
      BASE_URL: ${BASE_URL}
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
      - ./templates:/app/templates
    depends_on:
      db:
        condition: service_healthy

  # 前端 (Nginx)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: ai-test-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data: