<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>邮箱验证</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #f5f7fa;
            margin: 0;
            padding: 40px 20px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px 20px;
            text-align: center;
        }
        .header h1 {
            color: white;
            margin: 0;
            font-size: 24px;
            font-weight: 500;
        }
        .content {
            padding: 30px 25px;
        }
        .greeting {
            font-size: 18px;
            color: #333;
            margin-bottom: 20px;
        }
        .message {
            color: #666;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .btn-wrapper {
            text-align: center;
            margin-bottom: 30px;
        }
        .btn {
            display: inline-block;
            padding: 14px 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white !important;
            text-decoration: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 500;
            box-shadow: 0 4px 10px rgba(102, 126, 234, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(102, 126, 234, 0.4);
        }
        .link-box {
            background-color: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            word-break: break-all;
        }
        .link-label {
            font-size: 12px;
            color: #999;
            margin-bottom: 5px;
        }
        .link-text {
            color: #667eea;
            font-size: 13px;
        }
        .expire-note {
            color: #999;
            font-size: 13px;
            text-align: center;
            margin-top: 20px;
        }
        .footer {
            background-color: #fafafa;
            padding: 20px;
            text-align: center;
            border-top: 1px solid #eee;
        }
        .footer p {
            margin: 5px 0;
            color: #999;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📧 验证您的邮箱</h1>
        </div>
        <div class="content">
            <div class="greeting">你好，{{ name }}！</div>
            <div class="message">
                感谢您注册我们的服务。为了确保账户安全，请点击下方按钮验证您的邮箱地址。
            </div>
            <div class="btn-wrapper">
                <a href="{{ link }}" class="btn">验证邮箱</a>
            </div>
            <div class="link-box">
                <div class="link-label">如果按钮无法点击，请复制以下链接到浏览器：</div>
                <div class="link-text">{{ link }}</div>
            </div>
            <div class="expire-note">
                ⏰ 此链接将在 24 小时后失效
            </div>
        </div>
        <div class="footer">
            <p>此邮件由系统自动发送，请勿回复。</p>
            <p>如果您没有注册此账号，请忽略此邮件。</p>
        </div>
    </div>
</body>
</html>
